<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Healthy Fixture Site — Website Analyzer Test</title>
  <meta name="description" content="A well-formed fixture page used to validate that the analyzer scores a healthy site correctly.">
  <link rel="canonical" href="https://fixture.local/healthy">
  <meta property="og:title" content="Healthy Fixture Site">
  <meta property="og:description" content="A well-formed fixture page used for testing.">
</head>
<body>
  <header role="banner">
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <nav role="navigation" aria-label="Main navigation">
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/about">About</a></li>
      </ul>
    </nav>
  </header>

  <main id="main-content" role="main">
    <h1>Welcome to the Healthy Fixture Site</h1>
    <p>This page is designed to score well across all analyzer categories.</p>

    <section aria-labelledby="features-heading">
      <h2 id="features-heading">Features</h2>
      <p>This fixture demonstrates a page that passes all checks.</p>

      <img src="logo.png" alt="Company logo — a stylized globe" width="200" height="100">
      <img src="hero.png" alt="Team collaborating on laptops in a bright office" width="800" height="400">
    </section>

    <section aria-labelledby="contact-heading">
      <h2 id="contact-heading">Contact</h2>
      <form>
        <label for="email-input">Email address</label>
        <input id="email-input" type="email" name="email" autocomplete="email">

        <label for="message-input">Message</label>
        <textarea id="message-input" name="message" rows="4"></textarea>

        <button type="submit">Send message</button>
      </form>
    </section>
  </main>

  <footer role="contentinfo">
    <p>&copy; 2026 Fixture Corp. All rights reserved.</p>
  </footer>
</body>
</html>
